<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExcelMaster — Formation Excel Débutant → Expert</title>
<style>
/* ===================================================================
   ExcelMaster - Styles
   =================================================================== */
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #217346;
  --primary-dark: #185432;
  --primary-light: #2E8B57;
  --bg-main: #F3F2F1;
  --bg-card: #FFFFFF;
  --bg-sidebar: #2B2B2B;
  --bg-grid-header: #E6E6E6;
  --bg-grid-selected: #CCE8CF;
  --bg-grid-target: #FFF4C5;
  --text-primary: #201F1E;
  --text-secondary: #605E5C;
  --text-muted: #A19F9D;
  --success: #107C10;
  --success-bg: #DFF6DD;
  --error: #D13438;
  --error-bg: #FDE7E9;
  --warning: #F7B801;
  --warning-bg: #FFF4CE;
  --info: #0078D4;
  --info-bg: #DEECF9;
  --xp: #FFB400;
  --badge: #9C27B0;
  --grid-border: #D4D4D4;
}
body {
  font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
  background: var(--bg-main);
  color: var(--text-primary);
  min-height: 100vh;
}
button { font-family: inherit; cursor: pointer; border: none; }

/* ============ LOGIN ============ */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-card {
  background: white;
  border: 1px solid var(--grid-border);
  padding: 40px;
  border-radius: 4px;
  width: 420px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.login-logo { text-align: center; font-size: 48px; margin-bottom: 10px; }
.login-title { text-align: center; font-size: 32px; color: var(--primary); font-weight: bold; }
.login-tagline { text-align: center; color: var(--text-secondary); margin-bottom: 24px; font-size: 14px; }
.login-tabs { display: flex; border-bottom: 1px solid var(--grid-border); margin-bottom: 20px; }
.login-tabs button {
  flex: 1;
  padding: 12px;
  background: transparent;
  font-weight: bold;
  color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  font-size: 14px;
}
.login-tabs button.active { color: var(--primary); border-bottom-color: var(--primary); }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 4px; }
.form-group input {
  width: 100%; padding: 10px; font-size: 14px;
  border: 1px solid var(--grid-border); border-radius: 2px;
  font-family: inherit;
}
.form-group input:focus { outline: 2px solid var(--primary); border-color: var(--primary); }
.form-hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.btn-primary {
  width: 100%; padding: 12px; background: var(--primary); color: white;
  font-weight: bold; font-size: 14px; border-radius: 2px; margin-top: 10px;
  transition: background 0.2s;
}
.btn-primary:hover { background: var(--primary-dark); }
.error-msg { color: var(--error); font-size: 13px; margin-top: 8px; text-align: center; min-height: 18px; }
.version-tag { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 20px; }

/* ============ HEADER ============ */
.app-header {
  background: var(--bg-sidebar);
  color: white;
  padding: 18px 30px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.app-header .avatar { font-size: 36px; }
.app-header .user-info { flex: 1; }
.app-header .user-name { font-size: 18px; font-weight: bold; }
.app-header .user-role { font-size: 12px; color: #D0D0D0; }
.app-header .xp-block { text-align: center; }
.app-header .xp-level { color: var(--xp); font-weight: bold; font-size: 16px; }
.xp-bar {
  width: 260px; height: 12px; background: #4A4A4A; border-radius: 6px; margin: 5px auto; overflow: hidden;
}
.xp-bar-fill { height: 100%; background: var(--xp); transition: width 0.3s; }
.app-header .xp-text { font-size: 11px; color: #D0D0D0; }
.header-actions { display: flex; gap: 8px; }
.btn-header {
  padding: 8px 14px; font-size: 12px; font-weight: bold; border-radius: 2px;
  background: rgba(255,255,255,0.15); color: white; transition: background 0.2s;
}
.btn-header:hover { background: rgba(255,255,255,0.25); }
.btn-header.teacher { background: var(--warning); color: #333; }
.btn-header.danger { background: var(--error); }

/* ============ HOME ============ */
.home-body { padding: 25px 30px; }
.home-title { font-size: 22px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
.home-title .subtitle { font-size: 13px; color: var(--text-secondary); font-weight: normal; }
.modules-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
.module-card {
  background: white;
  border: 1px solid var(--grid-border);
  border-radius: 4px;
  display: flex;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.module-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.module-card.locked { opacity: 0.7; }
.module-stripe { width: 8px; flex-shrink: 0; }
.module-content { flex: 1; padding: 16px 18px; }
.module-header { display: flex; align-items: center; gap: 10px; }
.module-icon { font-size: 28px; }
.module-title-block { flex: 1; }
.module-title { font-size: 15px; font-weight: bold; }
.module-subtitle { font-size: 12px; color: var(--text-secondary); }
.module-status { font-size: 20px; }
.module-desc {
  font-size: 12px;
  color: var(--text-secondary);
  margin: 8px 0;
  line-height: 1.4;
}
.module-progress {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 10px 0 8px;
  font-size: 12px;
  color: var(--text-secondary);
}
.progress-bar {
  flex: 1;
  height: 8px;
  background: #E6E6E6;
  border-radius: 4px;
  overflow: hidden;
}
.progress-bar-fill { height: 100%; transition: width 0.3s; }
.module-actions { display: flex; gap: 8px; margin-top: 8px; }
.btn-module {
  padding: 7px 14px;
  font-size: 12px;
  font-weight: bold;
  border-radius: 2px;
  border: 1px solid transparent;
  transition: all 0.15s;
}
.btn-lesson {
  background: white;
  color: var(--primary);
  border-color: var(--grid-border);
}
.btn-lesson:hover { background: #F0F0F0; }
.btn-exercise {
  background: var(--primary);
  color: white;
}
.btn-exercise:hover { background: var(--primary-dark); }
.lock-msg { font-size: 12px; color: var(--warning); padding: 6px 0; }

/* ============ LESSON ============ */
.lesson-header {
  padding: 18px 30px;
  color: white;
  display: flex;
  align-items: center;
  gap: 20px;
}
.lesson-header h2 { font-size: 22px; font-weight: bold; }
.lesson-header .subtitle { font-size: 14px; opacity: 0.9; }
.lesson-body { padding: 25px 30px; max-width: 900px; }
.lesson-tabs { display: flex; gap: 10px; border-bottom: 2px solid var(--grid-border); margin-bottom: 20px; }
.lesson-tabs button {
  padding: 10px 18px;
  background: transparent;
  font-weight: bold;
  font-size: 13px;
  color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
}
.lesson-tabs button.active { color: var(--primary); border-bottom-color: var(--primary); }
.lesson-content-card {
  background: white;
  border: 1px solid var(--grid-border);
  padding: 25px;
  border-radius: 4px;
  font-size: 14px;
  line-height: 1.7;
  margin-bottom: 15px;
}
.lesson-content-card h3 { color: var(--primary); margin: 18px 0 10px; font-size: 15px; }
.lesson-content-card h3:first-child { margin-top: 0; }
.lesson-content-card p { margin-bottom: 10px; }
.lesson-content-card ul { margin: 10px 0 10px 24px; }
.lesson-content-card li { margin-bottom: 5px; }
.lesson-content-card code {
  font-family: 'Consolas', monospace;
  background: #F0F0F0;
  padding: 2px 6px;
  border-radius: 2px;
  color: var(--primary);
  font-size: 13px;
}
.tip-box {
  background: var(--warning-bg);
  border-left: 4px solid var(--warning);
  padding: 15px 20px;
  border-radius: 2px;
  margin-top: 15px;
}
.tip-box .tip-title { font-weight: bold; margin-bottom: 5px; }

/* ============ EXERCISE ============ */
.exercise-topbar {
  padding: 12px 20px;
  color: white;
  display: flex;
  align-items: center;
  gap: 20px;
}
.exercise-topbar h3 { font-size: 16px; font-weight: bold; }
.exercise-topbar .progress-text { margin-left: auto; font-weight: bold; }
.exercise-body {
  display: grid;
  grid-template-columns: 4fr 3fr;
  gap: 15px;
  padding: 15px 20px;
}
.exercise-panel {
  background: white;
  border: 1px solid var(--grid-border);
  border-radius: 4px;
  overflow: hidden;
}
/* Formula bar */
.formula-bar {
  display: flex;
  align-items: stretch;
  padding: 8px;
  gap: 4px;
  border-bottom: 1px solid var(--grid-border);
}
.fb-namebox {
  width: 60px;
  background: white;
  border: 1px solid var(--grid-border);
  text-align: center;
  line-height: 28px;
  font-family: 'Consolas', monospace;
  font-weight: bold;
}
.fb-fx {
  width: 30px;
  text-align: center;
  line-height: 28px;
  color: var(--primary);
  font-style: italic;
  font-weight: bold;
}
.fb-input {
  flex: 1;
  border: 1px solid var(--grid-border);
  padding: 5px 8px;
  font-family: 'Consolas', monospace;
  font-size: 13px;
}
.fb-input:focus { outline: 2px solid var(--primary); border-color: var(--primary); }

/* Excel grid */
.excel-grid {
  overflow: auto;
  max-height: 260px;
  border-top: 1px solid var(--grid-border);
}
table.xls {
  border-collapse: collapse;
  font-family: 'Calibri', sans-serif;
  font-size: 13px;
  width: 100%;
}
.xls th, .xls td {
  border: 1px solid var(--grid-border);
  min-width: 90px;
  height: 25px;
  padding: 3px 6px;
}
.xls th {
  background: var(--bg-grid-header);
  text-align: center;
  font-weight: bold;
  color: var(--text-primary);
}
.xls th.row-header { min-width: 35px; }
.xls td.numeric { text-align: right; }
.xls td.locked { background: #FAFAFA; color: #333; }
.xls td.target { background: var(--bg-grid-target) !important; }
.xls td.active {
  outline: 2px solid var(--primary);
  outline-offset: -2px;
}
.xls td input {
  width: 100%;
  border: none;
  outline: none;
  background: transparent;
  font-family: inherit;
  font-size: inherit;
  padding: 0;
}
.xls td.formula-cell { color: #000; }

.grid-actions {
  display: flex;
  padding: 10px;
  gap: 8px;
  justify-content: space-between;
  border-top: 1px solid var(--grid-border);
}
.btn-secondary {
  padding: 8px 14px;
  font-size: 12px;
  font-weight: bold;
  background: white;
  color: var(--text-primary);
  border: 1px solid var(--grid-border);
  border-radius: 2px;
}
.btn-success {
  padding: 8px 16px;
  font-size: 12px;
  font-weight: bold;
  background: var(--success);
  color: white;
  border-radius: 2px;
}
.btn-success:hover { background: #0E6B0E; }

/* Right panel */
.right-panel-scroll {
  overflow-y: auto;
  max-height: 640px;
}
.right-panel-header {
  padding: 12px 16px;
  color: white;
  font-weight: bold;
  font-size: 15px;
}
.right-panel-body { padding: 14px 16px; }
.xp-badge {
  color: var(--xp);
  font-weight: bold;
  font-size: 13px;
  margin-bottom: 12px;
}
.statement-box {
  background: var(--info-bg);
  border: 1px solid var(--info);
  padding: 12px;
  border-radius: 2px;
  font-size: 13px;
  line-height: 1.5;
  margin-bottom: 12px;
  white-space: pre-wrap;
}
.target-msg {
  background: var(--warning-bg);
  padding: 10px;
  border-radius: 2px;
  font-size: 12px;
  font-weight: bold;
  margin-bottom: 12px;
}
.section-title {
  font-size: 13px;
  font-weight: bold;
  margin: 10px 0 6px;
  color: var(--text-primary);
}
.hint-hidden {
  font-size: 11px;
  color: var(--text-secondary);
}
.hint-bubble {
  background: var(--warning-bg);
  border: 1px solid var(--warning);
  padding: 8px 12px;
  margin-bottom: 6px;
  font-size: 12px;
  border-radius: 2px;
}
.hint-bubble strong { display: block; color: #7A5200; margin-bottom: 3px; }
.btn-hint {
  padding: 6px 12px;
  font-size: 11px;
  font-weight: bold;
  background: var(--warning);
  color: white;
  border-radius: 2px;
  margin-top: 4px;
}
.btn-hint:disabled { background: #CCC; color: #666; cursor: not-allowed; }

/* Feedback */
.feedback {
  margin-top: 14px;
  padding: 12px;
  border-radius: 2px;
  border: 2px solid;
  font-size: 13px;
}
.feedback.success {
  background: var(--success-bg);
  border-color: var(--success);
}
.feedback.error {
  background: var(--error-bg);
  border-color: var(--error);
}
.feedback .fb-title {
  font-weight: bold;
  font-size: 15px;
  margin-bottom: 6px;
}
.feedback .fb-title.success { color: var(--success); }
.feedback .fb-title.error { color: var(--error); }
.explanation {
  background: var(--info-bg);
  border: 1px solid var(--info);
  padding: 10px;
  margin-top: 10px;
  font-size: 12px;
  line-height: 1.5;
  border-radius: 2px;
}
.explanation-title { color: var(--info); font-weight: bold; margin-bottom: 4px; }
.xp-earned {
  color: var(--xp);
  font-weight: bold;
  font-size: 15px;
  margin-top: 8px;
}
.badge-popup {
  background: var(--badge);
  color: white;
  padding: 10px;
  border-radius: 2px;
  margin-top: 10px;
  font-size: 12px;
}
.nav-buttons {
  display: flex;
  justify-content: space-between;
  padding: 10px 16px;
  border-top: 1px solid var(--grid-border);
  background: #FAFAFA;
}
.btn-back {
  padding: 8px 14px;
  font-size: 12px;
  font-weight: bold;
  background: transparent;
  color: white;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 2px;
}

/* Leaderboard */
.leaderboard-header {
  background: var(--primary);
  color: white;
  padding: 18px 30px;
  display: flex; align-items: center; gap: 15px;
}
.leaderboard-body { padding: 25px 30px; }
.podium {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin: 25px 0;
  align-items: flex-end;
}
.podium-spot {
  text-align: center;
  padding: 15px;
  border-radius: 4px;
  min-width: 180px;
  font-size: 14px;
}
.podium-spot.gold { background: #FFD700; height: 180px; }
.podium-spot.silver { background: #C0C0C0; height: 150px; }
.podium-spot.bronze { background: #CD7F32; color: white; height: 120px; }
.podium-spot .medal { font-size: 32px; }
.podium-spot .name { font-weight: bold; margin: 4px 0; }
.leaderboard-table {
  width: 100%;
  background: white;
  border: 1px solid var(--grid-border);
  border-radius: 4px;
  border-collapse: collapse;
}
.leaderboard-table th {
  background: var(--primary);
  color: white;
  padding: 10px;
  font-size: 13px;
  text-align: left;
}
.leaderboard-table td { padding: 10px; border-top: 1px solid var(--grid-border); font-size: 13px; }
.leaderboard-table tr.me { background: var(--warning-bg); font-weight: bold; }

/* Utility */
.center { text-align: center; }
</style>
</head>

<script>
// ===================================================================
// EXCEL FORMULA ENGINE (JavaScript port)
// ===================================================================
class ExcelError extends Error {
  constructor(code = '#VALEUR!', msg = '') {
    super(code + ' ' + msg);
    this.code = code;
    this.msg = msg;
  }
  toString() { return this.code; }
}

// --- Utils ---
function colLetterToIndex(s) {
  let n = 0;
  for (const c of s.toUpperCase()) n = n * 26 + (c.charCodeAt(0) - 64);
  return n;
}
function colIndexToLetter(n) {
  let s = '';
  while (n > 0) { const r = (n - 1) % 26; s = String.fromCharCode(65 + r) + s; n = Math.floor((n - 1) / 26); }
  return s;
}
function parseCellRef(ref) {
  const m = ref.toUpperCase().replace(/\$/g, '').match(/^([A-Z]+)(\d+)$/);
  if (!m) throw new ExcelError('#REF!');
  return { col: m[1], row: parseInt(m[2]) };
}
function toNumber(v) {
  if (v === null || v === undefined || v === '') return 0;
  if (typeof v === 'boolean') return v ? 1 : 0;
  if (typeof v === 'number') return v;
  if (typeof v === 'string') {
    const n = parseFloat(v.replace(',', '.'));
    if (isNaN(n)) throw new ExcelError('#VALEUR!', 'Not a number: ' + v);
    return n;
  }
  throw new ExcelError('#VALEUR!');
}
function toBool(v) {
  if (typeof v === 'boolean') return v;
  if (typeof v === 'number') return v !== 0;
  if (typeof v === 'string') {
    const u = v.trim().toUpperCase();
    if (u === 'VRAI' || u === 'TRUE') return true;
    if (u === 'FAUX' || u === 'FALSE' || u === '') return false;
  }
  return !!v;
}
function toText(v) {
  if (v === null || v === undefined) return '';
  if (typeof v === 'boolean') return v ? 'VRAI' : 'FAUX';
  if (typeof v === 'number') {
    if (Number.isInteger(v)) return String(v);
    return String(v).replace('.', ',');
  }
  return String(v);
}
function isNumeric(v) {
  if (typeof v === 'boolean') return false;
  if (typeof v === 'number') return true;
  if (typeof v === 'string') {
    const n = parseFloat(v.replace(',', '.'));
    return !isNaN(n) && isFinite(n);
  }
  return false;
}
function flatten(arr) {
  const out = [];
  for (const a of arr) {
    if (Array.isArray(a)) out.push(...flatten(a));
    else out.push(a);
  }
  return out;
}
function numericValues(args) {
  const out = [];
  for (const v of flatten(args)) {
    if (v === null || v === '' || typeof v === 'boolean') continue;
    if (typeof v === 'number') out.push(v);
    else if (typeof v === 'string') {
      const n = parseFloat(v.replace(',', '.'));
      if (!isNaN(n)) out.push(n);
    }
  }
  return out;
}
function valuesEqual(a, b) {
  if (isNumeric(a) && isNumeric(b)) return toNumber(a) === toNumber(b);
  return toText(a).toUpperCase() === toText(b).toUpperCase();
}
function matchCriterion(value, criterion) {
  if (typeof criterion === 'number') return isNumeric(value) && toNumber(value) === criterion;
  if (typeof criterion !== 'string') return value === criterion;
  const c = criterion.trim();
  for (const op of ['>=', '<=', '<>', '>', '<', '=']) {
    if (c.startsWith(op)) {
      const rhs = c.slice(op.length).trim();
      if (isNumeric(rhs) && isNumeric(value)) {
        const a = toNumber(value), b = toNumber(rhs);
        return {'=':a===b,'<>':a!==b,'>':a>b,'<':a<b,'>=':a>=b,'<=':a<=b}[op];
      }
      const a = toText(value), b = rhs;
      return {'=':a===b,'<>':a!==b,'>':a>b,'<':a<b,'>=':a>=b,'<=':a<=b}[op];
    }
  }
  if (c.includes('*') || c.includes('?')) {
    const re = new RegExp('^' + c.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')
      .replace(/\\\*/g,'.*').replace(/\\\?/g,'.') + '$', 'i');
    return re.test(toText(value));
  }
  if (isNumeric(c) && isNumeric(value)) return toNumber(c) === toNumber(value);
  return toText(value).toUpperCase() === c.toUpperCase();
}

// --- Functions ---
const FN = {
  SOMME: (...a) => numericValues(a).reduce((s,v)=>s+v,0),
  SUM: (...a) => FN.SOMME(...a),
  MOYENNE: (...a) => { const n = numericValues(a); if (!n.length) throw new ExcelError('#DIV/0!'); return n.reduce((s,v)=>s+v,0)/n.length; },
  AVERAGE: (...a) => FN.MOYENNE(...a),
  MIN: (...a) => { const n = numericValues(a); return n.length ? Math.min(...n) : 0; },
  MAX: (...a) => { const n = numericValues(a); return n.length ? Math.max(...n) : 0; },
  NB: (...a) => numericValues(a).length,
  COUNT: (...a) => FN.NB(...a),
  NBVAL: (...a) => flatten(a).filter(v => v !== null && v !== '' && v !== undefined).length,
  COUNTA: (...a) => FN.NBVAL(...a),
  'NB.VIDE': (...a) => flatten(a).filter(v => v === null || v === '').length,
  ARRONDI: (n, k) => { const x = toNumber(n), d = Math.pow(10, Math.trunc(toNumber(k))); return Math.round(x*d)/d; },
  ROUND: (n, k) => FN.ARRONDI(n, k),
  ENT: (n) => Math.floor(toNumber(n)),
  INT: (n) => FN.ENT(n),
  ABS: (n) => Math.abs(toNumber(n)),
  PUISSANCE: (n, p) => Math.pow(toNumber(n), toNumber(p)),
  POWER: (n, p) => FN.PUISSANCE(n, p),

const CONSTANTS = { VRAI: true, TRUE: true, FAUX: false, FALSE: false, PI: Math.PI };

// --- Tokenizer ---
const TOKEN_RE = /"([^"]|"")*"|\d+([.,]\d+)?([eE][+\-]?\d+)?|\$?[A-Za-z]+\$?\d+:\$?[A-Za-z]+\$?\d+|\$?[A-Za-z]+\$?\d+|[A-Za-zÀ-ÿ_][A-Za-zÀ-ÿ0-9_\.]*|<=|>=|<>|[+\-*/\^%&<>=]|\(|\)|[;,]|\s+/g;

function tokenize(formula) {
  let s = formula.trim();
  if (s.startsWith('=')) s = s.slice(1);
  const tokens = [];
  TOKEN_RE.lastIndex = 0;
  let m;
  let lastEnd = 0;
  while ((m = TOKEN_RE.exec(s)) !== null) {
    if (m.index !== lastEnd) throw new ExcelError('#NOM?', 'Unexpected char at ' + m.index);
    lastEnd = TOKEN_RE.lastIndex;
    const val = m[0];
    if (/^\s+$/.test(val)) continue;
    if (val.startsWith('"')) tokens.push(['STRING', val.slice(1,-1).replace(/""/g,'"')]);
    else if (/^\d/.test(val)) tokens.push(['NUMBER', val]);
    else if (/\$?[A-Za-z]+\$?\d+:/.test(val)) tokens.push(['RANGE', val]);
    else if (/^\$?[A-Za-z]+\$?\d+$/.test(val)) tokens.push(['CELL', val]);
    else if (/^[A-Za-zÀ-ÿ_]/.test(val)) {
      // peek to see if followed by (
      let peek = lastEnd;
      while (peek < s.length && /\s/.test(s[peek])) peek++;
      if (s[peek] === '(') tokens.push(['FUNC', val]);
      else tokens.push(['IDENT', val]);
    }
    else if (val === '(') tokens.push(['LPAREN', val]);
    else if (val === ')') tokens.push(['RPAREN', val]);
    else if (val === ';' || val === ',') tokens.push(['SEP', val]);
    else tokens.push(['OP', val]);
  }
  if (lastEnd !== s.length) throw new ExcelError('#NOM?', 'Parse error at ' + lastEnd);
  return tokens;
}

// --- Parser ---
class Parser {
  constructor(tokens) { this.t = tokens; this.i = 0; }
  peek() { return this.t[this.i] || [null, null]; }
  consume() { return this.t[this.i++]; }
  expect(k) { const t = this.consume(); if (!t || t[0] !== k) throw new ExcelError('#NOM?'); return t; }
  parse() { const e = this.parseComp(); if (this.i < this.t.length) throw new ExcelError('#NOM?'); return e; }
  parseComp() {
    let l = this.parseConcat();
    while (this.peek()[0] === 'OP' && ['=','<>','<','>','<=','>='].includes(this.peek()[1])) {
      const op = this.consume()[1], r = this.parseConcat();
      l = ['BINOP', op, l, r];
    } return l;
  }
  parseConcat() {
    let l = this.parseAdd();
    while (this.peek()[0] === 'OP' && this.peek()[1] === '&') { this.consume(); l = ['BINOP','&',l,this.parseAdd()]; }
    return l;
  }
  parseAdd() {
    let l = this.parseMul();
    while (this.peek()[0] === 'OP' && ['+','-'].includes(this.peek()[1])) { const op=this.consume()[1]; l=['BINOP',op,l,this.parseMul()]; }
    return l;
  }
  parseMul() {
    let l = this.parseExp();
    while (this.peek()[0] === 'OP' && ['*','/'].includes(this.peek()[1])) { const op=this.consume()[1]; l=['BINOP',op,l,this.parseExp()]; }
    return l;
  }
  parseExp() {
    let l = this.parseUnary();
    if (this.peek()[0] === 'OP' && this.peek()[1] === '^') { this.consume(); l = ['BINOP','^',l,this.parseExp()]; }
    return l;
  }
  parseUnary() {
    if (this.peek()[0] === 'OP' && this.peek()[1] === '-') { this.consume(); return ['UNARY','-',this.parseUnary()]; }
    if (this.peek()[0] === 'OP' && this.peek()[1] === '+') { this.consume(); return this.parseUnary(); }
    return this.parsePct();
  }
  parsePct() {
    const a = this.parseAtom();
    if (this.peek()[0] === 'OP' && this.peek()[1] === '%') { this.consume(); return ['UNARY','%',a]; }
    return a;
  }
  parseAtom() {
    const [k, v] = this.peek();
    if (k === 'NUMBER') { this.consume(); return ['NUM', parseFloat(v.replace(',','.'))]; }
    if (k === 'STRING') { this.consume(); return ['STR', v]; }
    if (k === 'LPAREN') { this.consume(); const e = this.parseComp(); this.expect('RPAREN'); return e; }
    if (k === 'FUNC') {
      this.consume(); this.expect('LPAREN');
      const args = [];
      if (this.peek()[0] !== 'RPAREN') {
        args.push(this.parseComp());
        while (this.peek()[0] === 'SEP') { this.consume(); args.push(this.parseComp()); }
      }
      this.expect('RPAREN');
      return ['CALL', v.toUpperCase(), args];
    }
    if (k === 'RANGE') { this.consume(); return ['RANGE', v.toUpperCase()]; }
    if (k === 'CELL') { this.consume(); return ['CELL', v.toUpperCase().replace(/\$/g,'')]; }

// --- Context ---
class Context {
  constructor(cells) {
    this.cells = {};
    for (const k in cells) this.cells[k.toUpperCase()] = cells[k];
  }
  get(ref) {
    const v = this.cells[ref.toUpperCase()];
    return v === '' ? null : (v === undefined ? null : v);
  }
  getRange(rng) {
    const m = rng.toUpperCase().replace(/\$/g,'').match(/^([A-Z]+)(\d+):([A-Z]+)(\d+)$/);
    if (!m) throw new ExcelError('#REF!');
    let ci1 = colLetterToIndex(m[1]), ci2 = colLetterToIndex(m[3]);
    let ri1 = parseInt(m[2]), ri2 = parseInt(m[4]);
    if (ci1 > ci2) [ci1, ci2] = [ci2, ci1];
    if (ri1 > ri2) [ri1, ri2] = [ri2, ri1];
    if (ri1 === ri2) {
      const row = [];
      for (let c = ci1; c <= ci2; c++) row.push(this.get(colIndexToLetter(c) + ri1));
      return row;
    }
    if (ci1 === ci2) {
      const col = [];
      for (let r = ri1; r <= ri2; r++) col.push(this.get(colIndexToLetter(ci1) + r));
      return col;
    }
    const rows = [];
    for (let r = ri1; r <= ri2; r++) {
      const row = [];
      for (let c = ci1; c <= ci2; c++) row.push(this.get(colIndexToLetter(c) + r));
      rows.push(row);
    }

  }

// --- Evaluator ---
function evalAst(node, ctx) {
  const t = node[0];

  if (t === 'CELL') return ctx.get(node[1]);
  if (t === 'RANGE') return ctx.getRange(node[1]);
  if (t === 'UNARY') {
    const v = evalAst(node[2], ctx);

    const a = evalAst(node[2], ctx), b = evalAst(node[3], ctx);

    }
    if (name === 'SI' || name === 'IF') {
      const c = toBool(evalAst(node[2][0], ctx));
      if (c) return evalAst(node[2][1], ctx);
      if (node[2].length > 2) return evalAst(node[2][2], ctx);
      return false;
    }
    if (name === 'ET' || name === 'AND') { for (const a of node[2]) if (!toBool(evalAst(a, ctx))) return false; return true; }
    if (name === 'OU' || name === 'OR') { for (const a of node[2]) if (toBool(evalAst(a, ctx))) return true; return false; }
    if (!(name in FN)) throw new ExcelError('#NOM?', 'Unknown function: ' + name);
    const args = node[2].map(a => evalAst(a, ctx));
    return FN[name](...args);
  }
  throw new ExcelError('#NOM?');
}

function evaluate(formula, cells) {
  if (!formula || !String(formula).trim()) return '';
  const ctx = new Context(cells);
  const tokens = tokenize(formula);
  const ast = new Parser(tokens).parse();
  return evalAst(ast, ctx);
}

function safeEvaluate(formula, cells) {
  try { return [evaluate(formula, cells), null]; }
  catch (e) { return [null, e instanceof ExcelError ? e.code : ('#ERREUR! ' + e.message)]; }
}

function valuesEquivalent(a, b, tol = 1e-6) {
  if (a === null && (b === null || b === '' || b === undefined)) return true;
  if (b === null && (a === null || a === '' || a === undefined)) return true;
  if (typeof a === 'boolean' || typeof b === 'boolean') return toBool(a) === toBool(b);
  if (isNumeric(a) && isNumeric(b)) return Math.abs(toNumber(a) - toNumber(b)) <= tol;
  return toText(a).trim().toUpperCase() === toText(b).trim().toUpperCase();
}

// LocalStorage helpers
const STORAGE_KEY = 'excelmaster_users';
function loadUsers() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}
function saveUsers(u) { localStorage.setItem(STORAGE_KEY, JSON.stringify(u)); }
function getUser(name) { return loadUsers()[name]; }
function saveUser(user) {
  const all = loadUsers();
  all[user.username] = user;
  saveUsers(all);
}
function allStudents() {
  const all = loadUsers();
  return Object.values(all).filter(u => u.role === 'student').sort((a,b) => b.total_xp - a.total_xp);
}

// ===================================================================
// LOGIC
// ===================================================================
function createUser(username, fullName, password, role = 'student', classGroup = '') {
  const users = loadUsers();
  if (users[username]) return null;
  const u = {
    username, full_name: fullName, class_group: classGroup,
    role, password_hash: btoa(password), // démo seulement (pas cryptographique)
    total_xp: 0, level: 1, progress: {}, badges: [],
    created_at: new Date().toISOString(),
  };
  saveUser(u);
  return u;
}
function authenticate(username, password) {
  const u = getUser(username);
  if (!u || u.password_hash !== btoa(password)) return null;
  return u;
}
function updateXP(user, delta) {
  user.total_xp = Math.max(0, user.total_xp + delta);
  user.level = Math.min(50, 1 + Math.floor(user.total_xp / 100));
  saveUser(user);
}
function recordAttempt(user, moduleId, exerciseId, success, xpEarned, hintsUsed) {
  const prog = user.progress[exerciseId] || { status: 'in_progress', attempts: 0, xp_earned: 0, hints_used: 0 };
  prog.attempts += 1;
  prog.hints_used += hintsUsed;
  prog.module_id = moduleId;
  if (success && prog.status !== 'completed') {
    prog.status = 'completed';
    prog.xp_earned = xpEarned;
    prog.completed_at = new Date().toISOString();
  }
  user.progress[exerciseId] = prog;
  saveUser(user);
}
function getModuleProgress(user, moduleId) {
  const completed = Object.values(user.progress || {})
    .filter(p => p.module_id === moduleId && p.status === 'completed').length;
  const total = MODULES.find(m => m.id === moduleId).exercises.length;
  return { completed, total };
}
function moduleIsUnlocked(user, moduleId) {
  if (user.role === 'teacher' || moduleId <= 1) return true;
  const prev = getModuleProgress(user, moduleId - 1);
  if (prev.total === 0) return true;
  return (prev.completed / prev.total) >= 0.7;
}
function awardBadge(user, code) {
  if (user.badges.includes(code)) return false;
  user.badges.push(code);
  saveUser(user);
  return true;
}
function checkBadges(user, moduleId) {
  const completed = Object.values(user.progress || {}).filter(p => p.status === 'completed').length;
  const newBadges = [];
  const milestones = [
    [1, 'FIRST_STEP', '🌱', 'Premier pas'],
    [5, 'FIVE', '⭐', '5 exercices !'],
    [10, 'TEN', '⭐⭐', '10 exercices !'],
    [25, 'TWENTY_FIVE', '🏅', '25 exercices !'],
    [50, 'FIFTY', '🏆', '50 exercices !'],
    [100, 'HUNDRED', '👑', '100 exercices !'],
  ];
  for (const [n, code, icon, name] of milestones) {
    if (completed >= n && awardBadge(user, code)) {
      newBadges.push({ code, icon, name });
    }
  }
  // Module complete
  const mp = getModuleProgress(user, moduleId);
  if (mp.completed >= mp.total) {
    const code = `MOD${moduleId}_MASTER`;
    if (awardBadge(user, code)) {
      newBadges.push({ code, icon: '🎖️', name: `Module ${moduleId} terminé` });
    }
  }
  return newBadges;
}

const $ = (sel) => document.querySelector(sel);
const h = (tag, attrs = {}, ...children) => {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
    else el.setAttribute(k, v);
  }
  for (const c of children) {
    if (c === null || c === undefined || c === false) continue;
    if (Array.isArray(c)) c.forEach(cc => el.appendChild(typeof cc === 'string' ? document.createTextNode(cc) : cc));
    else el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return el;
};

function render() {
  const app = $('#app');
  app.innerHTML = '';
  if (APP.currentScreen === 'login') app.appendChild(renderLogin());
  else if (APP.currentScreen === 'home') app.appendChild(renderHome());
  else if (APP.currentScreen === 'lesson') app.appendChild(renderLesson());
  else if (APP.currentScreen === 'exercise') app.appendChild(renderExercise());
  else if (APP.currentScreen === 'leaderboard') app.appendChild(renderLeaderboard());
}

// --- LOGIN ---
function renderLogin() {
  const screen = h('div', { id: 'login-screen' });
  const card = h('div', { class: 'login-card' });

  card.appendChild(h('div', { class: 'login-logo' }, '📊'));
  card.appendChild(h('div', { class: 'login-title' }, 'ExcelMaster'));
  card.appendChild(h('div', { class: 'login-tagline' }, 'Formation Excel Débutant → Expert'));

  // Tabs
  let activeTab = 'connect';
  const tabs = h('div', { class: 'login-tabs' });
  const btnConn = h('button', { class: 'active', onclick: () => switchTab('connect') }, 'Connexion');
  const btnReg = h('button', { onclick: () => switchTab('register') }, 'Inscription');
  tabs.append(btnConn, btnReg);
  card.appendChild(tabs);

  const formArea = h('div', {});
  card.appendChild(formArea);

  const errorMsg = h('div', { class: 'error-msg' });

  function switchTab(t) {
    activeTab = t;
    btnConn.classList.toggle('active', t === 'connect');
    btnReg.classList.toggle('active', t === 'register');
    formArea.innerHTML = '';
    errorMsg.textContent = '';
    if (t === 'connect') formArea.appendChild(renderConnectForm());
    else formArea.appendChild(renderRegisterForm());
    formArea.appendChild(errorMsg);
  }
  function renderConnectForm() {
    const f = h('div');
    const userInput = h('input', { type: 'text', placeholder: 'Identifiant' });
    const pwdInput = h('input', { type: 'password', placeholder: 'Mot de passe' });
    f.append(
      h('div', { class: 'form-group' }, h('label', {}, 'Identifiant'), userInput),
      h('div', { class: 'form-group' }, h('label', {}, 'Mot de passe'), pwdInput),
      h('button', { class: 'btn-primary', onclick: tryLogin }, 'Se connecter')
    );
    pwdInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
    function tryLogin() {
      const u = authenticate(userInput.value.trim().toLowerCase(), pwdInput.value);
      if (!u) { errorMsg.textContent = 'Identifiant ou mot de passe incorrect.'; return; }
      APP.user = u;
      APP.currentScreen = 'home';
      render();
    }
    return f;
  }
  function renderRegisterForm() {
    const f = h('div');
    const fullName = h('input', { type: 'text', placeholder: 'Nom complet' });
    const userInput = h('input', { type: 'text', placeholder: 'sans espaces' });
    const classInput = h('input', { type: 'text', placeholder: 'Classe (optionnel)' });
    const pwdInput = h('input', { type: 'password', placeholder: '4 caractères min.' });
    const codeInput = h('input', { type: 'password', placeholder: 'Laisser vide pour élève' });
    f.append(
      h('div', { class: 'form-group' }, h('label', {}, 'Nom complet'), fullName),
      h('div', { class: 'form-group' }, h('label', {}, 'Identifiant (sans espaces)'), userInput),
      h('div', { class: 'form-group' }, h('label', {}, 'Classe / Groupe (facultatif)'), classInput),
      h('div', { class: 'form-group' }, h('label', {}, 'Mot de passe'), pwdInput),
      h('div', { class: 'form-group' },
        h('label', {}, 'Code formateur (optionnel)'), codeInput,
        h('div', { class: 'form-hint' }, 'Laissez vide pour un compte élève')),
      h('button', { class: 'btn-primary', onclick: tryRegister }, 'Créer mon compte')
    );
    function tryRegister() {
      const fn = fullName.value.trim(), un = userInput.value.trim().toLowerCase(),
            pwd = pwdInput.value, cls = classInput.value.trim(), code = codeInput.value;
      if (!fn || !un || !pwd) { errorMsg.textContent = 'Champs obligatoires : nom, identifiant, mot de passe.'; return; }
      if (pwd.length < 4) { errorMsg.textContent = 'Mot de passe trop court (min. 4).'; return; }
      if (un.includes(' ')) { errorMsg.textContent = 'L\'identifiant ne doit pas contenir d\'espaces.'; return; }
      let role = 'student';
      if (code) {
        if (code !== 'MIENMO2026') { errorMsg.textContent = 'Code formateur incorrect.'; return; }
        role = 'teacher';
      }
      if (!createUser(un, fn, pwd, role, cls)) { errorMsg.textContent = 'Cet identifiant existe déjà.'; return; }
      errorMsg.style.color = '#107C10';
      errorMsg.textContent = '✓ Compte créé ! Basculez sur Connexion.';
      setTimeout(() => { switchTab('connect'); formArea.querySelector('input').value = un; }, 1200);
    }
    return f;
  }

  formArea.appendChild(renderConnectForm());
  formArea.appendChild(errorMsg);
  card.appendChild(h('div', { class: 'version-tag' }, 'Version 1.0 — Démo web'));
  screen.appendChild(card);
  return screen;
}

function renderModuleCard(m) {

      h('div', { class: 'module-subtitle' }, m.subtitle)),
    h('div', { class: 'module-status' }, !unlocked ? '🔒' : (prog.completed === prog.total && prog.total > 0 ? '✓' : ''))
  );
  content.appendChild(header);

  if (prog.total > 0) {

    );

  card.appendChild(content);

function renderLesson() {
  const m = APP.currentModule;
  const main = h('div');

  const header = h('div', { class: 'lesson-header', style: `background:${m.color}` },
    h('button', { class: 'btn-back', onclick: () => { APP.currentScreen = 'home'; render(); } }, '← Retour'),
    h('div', {},
      h('h2', {}, `${m.icon}  Module ${m.id} — ${m.title}`),
      h('div', { class: 'subtitle' }, m.subtitle)),
    h('button', { class: 'btn-primary', style: 'width:auto;margin:0', onclick: () => { APP.currentExerciseIdx = 0; APP.currentScreen = 'exercise'; render(); } }, '▶ Aller aux exercices')
  );
  main.appendChild(header);

  const body = h('div', { class: 'lesson-body' });

  const tabs = h('div', { class: 'lesson-tabs' });
  const tabContent = h('div');
  m.lessons.forEach((l, i) => {
    const btn = h('button', { class: i === 0 ? 'active' : '', onclick: () => {
      tabs.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderLessonContent(l);
    } }, l.title.split(' ')[0]);
    tabs.appendChild(btn);
  });
  body.appendChild(tabs);
  body.appendChild(tabContent);

  function renderLessonContent(l) {
    tabContent.innerHTML = '';
    const card = h('div', { class: 'lesson-content-card' });
    // Render content with simple markdown
    const html = l.content
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/^• (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.+<\/li>)/s, '<ul>$1</ul>')
      .replace(/(=[A-Z][A-Z0-9.]*\([^)]*\))/g, '<code>$1</code>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');
    card.innerHTML = `<p>${html}</p>`;
    tabContent.appendChild(card);
    if (l.tip) {
      tabContent.appendChild(h('div', { class: 'tip-box' },
        h('div', { class: 'tip-title' }, '💡  Astuce du formateur'),
        h('div', {}, l.tip)));
    }
  }
  renderLessonContent(m.lessons[0]);

  main.appendChild(body);
  return main;
}

// --- EXERCISE ---
function renderExercise() {
  const m = APP.currentModule;
  const ex = m.exercises[APP.currentExerciseIdx];
  APP.hintsShown = 0;
  APP.attempts = 0;
  APP.gridCells = {...ex.initial_data};
  APP.gridLocked = new Set(Object.keys(ex.initial_data));
  APP.gridLocked.delete(ex.target_cell);
  APP.gridTargetCell = ex.target_cell;
  APP.gridActiveCell = ex.target_cell;

  const main = h('div');
  // Top bar
  main.appendChild(h('div', { class: 'exercise-topbar', style: `background:${m.color}` },
    h('button', { class: 'btn-back', onclick: () => { APP.currentScreen = 'home'; render(); } }, '← Retour'),
    h('h3', {}, `${m.icon}  Module ${m.id} — ${m.title}`),
    h('span', { class: 'progress-text' }, `Exercice ${APP.currentExerciseIdx + 1} / ${m.exercises.length}`)
  ));

  const body = h('div', { class: 'exercise-body' });

  // LEFT: Grid
  const leftPanel = h('div', { class: 'exercise-panel' });
  const fbInput = h('input', { class: 'fb-input', type: 'text', placeholder: 'Saisissez votre formule (commence par =)' });
  const nameBox = h('div', { class: 'fb-namebox' }, ex.target_cell);
  leftPanel.appendChild(h('div', { class: 'formula-bar' },
    nameBox, h('div', { class: 'fb-fx' }, 'ƒx'), fbInput
  ));
  const gridContainer = h('div', { class: 'excel-grid' });
  leftPanel.appendChild(gridContainer);
  renderGrid(gridContainer, fbInput, nameBox);

  leftPanel.appendChild(h('div', { class: 'grid-actions' },
    h('button', { class: 'btn-secondary', onclick: () => {
      APP.gridCells = {...ex.initial_data};
      renderGrid(gridContainer, fbInput, nameBox);
    } }, '🧹 Réinitialiser'),
    h('button', { class: 'btn-success', onclick: () => checkAnswer(ex, fbInput, gridContainer, rightPanelBody) }, '✓ Vérifier ma formule')
  ));
  body.appendChild(leftPanel);

  // RIGHT: statement + hints + feedback
  const rightPanel = h('div', { class: 'exercise-panel' });
  rightPanel.appendChild(h('div', { class: 'right-panel-header', style: `background:${m.color}` }, `📝 ${ex.title}`));
  const rightPanelBody = h('div', { class: 'right-panel-body' });
  rightPanelBody.appendChild(h('div', { class: 'xp-badge' }, `🎯 Récompense : ${ex.xp} XP`));
  rightPanelBody.appendChild(h('div', { class: 'section-title' }, '📖 Énoncé'));
  rightPanelBody.appendChild(h('div', { class: 'statement-box' }, ex.statement));
  rightPanelBody.appendChild(h('div', { class: 'target-msg' }, `✍️  Remplissez la cellule ${ex.target_cell} (en surbrillance jaune).`));
  rightPanelBody.appendChild(h('div', { class: 'section-title' }, '💡 Indices'));
  const hintsContainer = h('div', {});
  rightPanelBody.appendChild(hintsContainer);
  const hintsHint = h('div', { class: 'hint-hidden' }, `🔒 ${ex.hints.length} indice(s) disponibles. Chaque indice coûte -2 XP.`);
  hintsContainer.appendChild(hintsHint);
  const hintBtn = h('button', { class: 'btn-hint', onclick: () => {
    if (APP.hintsShown >= ex.hints.length) return;
    hintsHint.style.display = 'none';
    const bubble = h('div', { class: 'hint-bubble' },
      h('strong', {}, `💡 Indice ${APP.hintsShown + 1}`),
      h('span', {}, ex.hints[APP.hintsShown]));
    hintsContainer.insertBefore(bubble, hintBtn);
    APP.hintsShown++;
    if (APP.hintsShown >= ex.hints.length) { hintBtn.disabled = true; hintBtn.textContent = 'Tous les indices affichés'; }
  } }, 'Afficher un indice');
  hintsContainer.appendChild(hintBtn);

  // Feedback zone
  const fbZone = h('div', { id: 'feedback-zone' });
  rightPanelBody.appendChild(fbZone);

  // Navigation
  const nav = h('div', { style: 'display:flex;justify-content:space-between;margin-top:16px' });
  if (APP.currentExerciseIdx > 0) {
    nav.appendChild(h('button', { class: 'btn-secondary', onclick: () => {
      APP.currentExerciseIdx--; render();
    } }, '◀ Précédent'));
  } else { nav.appendChild(h('div', {})); }
  if (APP.currentExerciseIdx < m.exercises.length - 1) {
    nav.appendChild(h('button', { class: 'btn-secondary', onclick: () => {
      APP.currentExerciseIdx++; render();
    } }, 'Suivant ▶'));
  } else { nav.appendChild(h('div', {})); }
  rightPanelBody.appendChild(nav);

  const scroll = h('div', { class: 'right-panel-scroll' }, rightPanelBody);
  rightPanel.appendChild(scroll);
  body.appendChild(rightPanel);

  main.appendChild(body);
  return main;
}

function renderGrid(container, fbInput, nameBox) {
  container.innerHTML = '';
  const table = h('table', { class: 'xls' });
  const rows = 10, cols = 7;
  // Header row
  const headRow = h('tr');
  headRow.appendChild(h('th', { class: 'row-header' }, ''));
  for (let c = 1; c <= cols; c++) headRow.appendChild(h('th', {}, colIndexToLetter(c)));
  table.appendChild(headRow);
  // Data rows
  for (let r = 1; r <= rows; r++) {
    const tr = h('tr');
    tr.appendChild(h('th', { class: 'row-header' }, String(r)));
    for (let c = 1; c <= cols; c++) {
      const ref = colIndexToLetter(c) + r;
      const td = h('td', { 'data-ref': ref });
      const raw = APP.gridCells[ref];
      let display = '';
      let isNum = false;
      if (raw !== undefined && raw !== '') {
        if (typeof raw === 'string' && raw.startsWith('=')) {
          const [val, err] = safeEvaluate(raw, APP.gridCells);
          if (err) { display = err; td.style.color = 'var(--error)'; }
          else { display = formatDisplay(val); isNum = typeof val === 'number'; td.classList.add('formula-cell'); }
        } else { display = String(raw); isNum = typeof raw === 'number'; }
      }
      if (isNum) td.classList.add('numeric');
      if (APP.gridLocked.has(ref)) td.classList.add('locked');
      if (ref === APP.gridTargetCell) td.classList.add('target');
      if (ref === APP.gridActiveCell) td.classList.add('active');
      td.textContent = display;
      td.addEventListener('click', () => {
        APP.gridActiveCell = ref;
        nameBox.textContent = ref;
        const cur = APP.gridCells[ref];
        fbInput.value = cur !== undefined ? String(cur) : '';
        if (!APP.gridLocked.has(ref)) fbInput.focus();
        renderGrid(container, fbInput, nameBox);
      });
      td.addEventListener('dblclick', () => {
        if (APP.gridLocked.has(ref)) return;
        APP.gridActiveCell = ref;
        fbInput.focus();
      });
      tr.appendChild(td);
    }
    table.appendChild(tr);
  }
  container.appendChild(table);
  // Formula bar commit handler
  fbInput.onkeydown = (e) => {
    if (e.key === 'Enter') {
      const raw = fbInput.value.trim();
      const ref = APP.gridActiveCell;
      if (!APP.gridLocked.has(ref)) {
        if (raw === '') delete APP.gridCells[ref];
        else if (raw.startsWith('=')) APP.gridCells[ref] = raw;
        else {
          const n = parseFloat(raw.replace(',', '.'));
          APP.gridCells[ref] = (!isNaN(n) && /^-?\d+([.,]\d+)?$/.test(raw)) ? n : raw;
        }
        renderGrid(container, fbInput, nameBox);
      }
    }
  };
}

function formatDisplay(v) {
  if (v === null || v === undefined || v === '') return '';
  if (typeof v === 'boolean') return v ? 'VRAI' : 'FAUX';
  if (typeof v === 'number') {
    if (Number.isInteger(v)) return String(v);
    return v.toFixed(6).replace(/\.?0+$/, '').replace('.', ',');
  }
  return String(v);
}

function checkAnswer(ex, fbInput, gridContainer, rightBody) {
  APP.attempts++;
  const fbZone = document.getElementById('feedback-zone');
  fbZone.innerHTML = '';

  const raw = APP.gridCells[ex.target_cell];
  const userFormula = raw !== undefined ? String(raw).trim() : '';

  if (!userFormula) {
    return showError(fbZone, 'Cellule vide', `La cellule ${ex.target_cell} est vide. Écrivez une formule commençant par =.`);
  }
  if (!userFormula.startsWith('=')) {
    return showError(fbZone, 'Pas de formule', 'Votre saisie ne commence pas par =. Toute formule Excel commence par le signe =.');
  }

  const ctx = {...ex.initial_data};
  const [result, err] = safeEvaluate(userFormula, ctx);
  if (err) {
    return showError(fbZone, `Erreur : ${err}`,
      `Votre formule provoque une erreur.\n\nVérifiez :\n• l'orthographe des fonctions (SOMME, SI, RECHERCHEV...)\n• les parenthèses fermées\n• le séparateur : ; (point-virgule)\n• les guillemets autour des textes "..."`);
  }
  if (!valuesEquivalent(result, ex.expected_value)) {
    return showError(fbZone, 'Mauvais résultat',
      `Votre formule donne :\n    ➜  ${formatDisplay(result)}\n\nRésultat attendu :\n    ➜  ${formatDisplay(ex.expected_value)}\n\nRevoyez votre logique ou utilisez un indice.`);
  }
  if (ex.mustContain) {
    const missing = ex.mustContain.filter(t => !userFormula.toUpperCase().includes(t.toUpperCase()));
    if (missing.length) {
      return showError(fbZone, 'Technique attendue',
        `Bravo, votre formule donne le bon résultat !\n\n⚠️ Mais pour cet exercice, la formule doit contenir : ${missing.join(', ')}\n\nRevoyez les indices pour la technique exacte.`);
    }
  }
  awardSuccess(ex, fbZone);
}

function awardSuccess(ex, fbZone) {
  const xpBase = ex.xp;
  const bonus = APP.attempts === 1 ? 5 : (APP.attempts === 2 ? 3 : 0);
  const malus = APP.hintsShown * 2;
  const xpFinal = Math.max(1, xpBase + bonus - malus);

  const prev = APP.user.progress[ex.id];
  const wasFirst = !prev || prev.status !== 'completed';

  recordAttempt(APP.user, APP.currentModule.id, ex.id, true, wasFirst ? xpFinal : 0, APP.hintsShown);
  if (wasFirst) updateXP(APP.user, xpFinal);
  APP.user = getUser(APP.user.username);
  const newBadges = checkBadges(APP.user, APP.currentModule.id);

  const banner = h('div', { class: 'feedback success' });
  banner.appendChild(h('div', { class: 'fb-title success' }, wasFirst ? '🎉 BRAVO, BONNE RÉPONSE !' : '✓ Formule correcte'));
  if (wasFirst) {
    banner.appendChild(h('div', {}, `+${xpBase} XP (base)` + (bonus ? ` • +${bonus} XP (bonus ${APP.attempts}ᵉ essai)` : '') + (malus ? ` • -${malus} XP (${APP.hintsShown} indice)` : '')));
    banner.appendChild(h('div', { class: 'xp-earned' }, `✨ Total gagné : +${xpFinal} XP`));
  }
  fbZone.appendChild(banner);

  if (ex.explanation) {
    fbZone.appendChild(h('div', { class: 'explanation' },
      h('div', { class: 'explanation-title' }, '📚 Explication'),
      h('div', {}, ex.explanation)));
  }
  for (const b of newBadges) {
    fbZone.appendChild(h('div', { class: 'badge-popup' },
      h('strong', {}, `🎖️ NOUVEAU BADGE : ${b.icon} ${b.name}`)));
  }

  // Next button
  const m = APP.currentModule;
  if (APP.currentExerciseIdx < m.exercises.length - 1) {
    fbZone.appendChild(h('button', { class: 'btn-primary', style: 'width:auto;margin-top:14px', onclick: () => {
      APP.currentExerciseIdx++; render();
    } }, 'Exercice suivant ▶'));
  } else {
    fbZone.appendChild(h('button', { class: 'btn-primary', style: 'width:auto;margin-top:14px;background:var(--success)', onclick: () => {
      APP.currentScreen = 'home'; render();
    } }, '🏁 Terminer le module'));
  }
}

function showError(fbZone, title, msg) {
  const box = h('div', { class: 'feedback error' });
  box.appendChild(h('div', { class: 'fb-title error' }, `✗ ${title}`));
  box.appendChild(h('div', { style: 'white-space:pre-wrap' }, msg));
  fbZone.appendChild(box);
  recordAttempt(APP.user, APP.currentModule.id, MODULES.find(mm=>mm.id===APP.currentModule.id).exercises[APP.currentExerciseIdx].id, false, 0, 0);
}

// --- LEADERBOARD ---
function renderLeaderboard() {
  const main = h('div');
  main.appendChild(h('div', { class: 'leaderboard-header' },
    h('button', { class: 'btn-back', onclick: () => { APP.currentScreen = 'home'; render(); } }, '← Retour'),
    h('h2', { style: 'font-size:22px;font-weight:bold;margin:0' }, '🏆  Classement des apprenants')
  ));
  const body = h('div', { class: 'leaderboard-body' });
  const students = allStudents();
  if (students.length === 0) {
    body.appendChild(h('div', { class: 'center', style: 'padding:60px' }, 'Aucun élève pour l\'instant. Créez d\'autres comptes pour voir le classement.'));
  } else {
    // Podium
    const podium = h('div', { class: 'podium' });
    const positions = [[1, 'silver'], [0, 'gold'], [2, 'bronze']];
    const medals = ['🥇', '🥈', '🥉'];
    for (const [idx, cls] of positions) {
      if (idx >= students.length) continue;
      const s = students[idx];
      podium.appendChild(h('div', { class: `podium-spot ${cls}` },
        h('div', { class: 'medal' }, medals[idx]),
        h('div', { class: 'name' }, s.full_name),
        h('div', {}, `${s.total_xp} XP`),
        h('div', { style: 'font-size:12px' }, `Niv. ${s.level}`)
      ));
    }
    body.appendChild(podium);
    body.appendChild(h('div', { class: 'center', style: 'font-size:18px;font-weight:bold;margin:15px 0' }, 'Classement complet'));
    const table = h('table', { class: 'leaderboard-table' });
    table.appendChild(h('tr', {},
      h('th', {}, 'Rang'), h('th', {}, 'Apprenant'), h('th', {}, 'Classe'),
      h('th', {}, 'Niveau'), h('th', {}, 'XP'), h('th', {}, 'Exos réussis'), h('th', {}, 'Badges')));
    students.forEach((s, i) => {
      const completed = Object.values(s.progress || {}).filter(p => p.status === 'completed').length;
      const tr = h('tr', { class: s.username === APP.user.username ? 'me' : '' },
        h('td', {}, `#${i+1}`), h('td', {}, s.full_name), h('td', {}, s.class_group || '—'),
        h('td', {}, String(s.level)), h('td', {}, `${s.total_xp} XP`),
        h('td', {}, String(completed)), h('td', {}, `🏅 ${(s.badges || []).length}`));
      table.appendChild(tr);
    });
    body.appendChild(table);
  }
  main.appendChild(body);
  return main;
}
